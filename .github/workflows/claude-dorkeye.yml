# ─────────────────────────────────────────────────────────────────────────────
# 🦅 DorkEye — Claude Code Agent Workflow
# Powered by Anthropic Claude Code Action v1
#
# TRIGGERS:
#   • Ogni PR aperta/aggiornata → review automatica con analisi bug + security
#   • @claude nei commenti/issues → assistente interattivo
#   • Ogni lunedì alle 09:00 UTC → audit settimanale completo del repo
#   • workflow_dispatch → esecuzione manuale dell'audit
# ─────────────────────────────────────────────────────────────────────────────

name: 🦅 DorkEye AI Agent

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

  issue_comment:
    types: [created]

  pull_request_review_comment:
    types: [created]

  issues:
    types: [opened, assigned]

  schedule:
    - cron: "0 9 * * 1" # Ogni lunedì alle 09:00 UTC

  workflow_dispatch: # Trigger manuale dall'interfaccia GitHub

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — PR Review automatica
# Analisi completa di ogni PR: bug, vuln, sicurezza, qualità del codice
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  pr-review:
    name: 🔍 PR Review & Security Analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            AUTHOR: ${{ github.event.pull_request.user.login }}

            Sei un senior security engineer e Python expert che rivede una PR per DorkEye,
            uno strumento avanzato di OSINT e Google Dorking scritto in Python da xPloits3c.

            ARCHITETTURA DEL PROGETTO:
            - dorkeye.py: script principale (dorking Google/DuckDuckGo, WAF detection, SQLi)
            - Tools/dorkeye_analyze.py: SQLi analyzer con confidence scoring
            - Tools/dorkeye_report.py: generatore report HTML (attenzione XSS)
            - config/: template YAML e configurazioni dork
            - requirements.txt: requests, urllib3, PyYAML, rich, ddgs>=4.0.0,<5.0.0
              NOTA: ddgs è pinnato a v4.x deliberatamente — v5 introduce breaking changes
              sull'API (da funzioni standalone a classe DDGS). NON suggerire upgrade a v5.

            ANALIZZA QUESTA PR CON PRIORITÀ:

            🔴 CRITICO (blocca il merge):
            - XSS nel report HTML: content non sanitizzato inserito nel DOM
            - SQL injection nella costruzione di payload o query
            - Command injection via subprocess/os.system con input utente
            - Secrets, API key o credenziali hardcoded
            - Path traversal vulnerabilities
            - Incompatibilità Python 3.8 (walrus :=, match/case, typing union |, ecc.)
            - Funzioni di sicurezza definite ma mai invocate (es. test_path_based_sqli)

            🟡 SECURITY (segnala come warning):
            - yaml.load() senza Loader=yaml.SafeLoader
            - pickle o deserializzazioni insicure
            - Verifica SSL/TLS disabilitata (verify=False)
            - Leakage di dati sensibili in log o messaggi di errore
            - Input esterni non validati prima dell'uso

            🔵 QUALITÀ DEL CODICE:
            - Gap nell'assegnazione SQLiConfidence.CRITICAL
            - Bug baseline_status == None nel SQLi analyzer
            - Payload cross-database incompleti per time-based SQLi
            - Implementazioni stub o placeholder mai completate
            - Gestione errori mancante nelle chiamate di rete
            - Inconsistenze nell'output rich console

            🟢 MIGLIORAMENTI:
            - PEP 8 e best practice Python
            - Ottimizzazioni performance
            - Documentazione mancante per nuove funzioni
            - Suggerimenti per test coverage

            FORMATO RISPOSTA:
            Usa commenti inline per problemi specifici al codice.
            Posta un commento di riepilogo con una tabella di valutazione usando emoji e
            severity (🔴 CRITICAL / 🟡 HIGH / 🔵 MEDIUM / 🟢 LOW).
            Sii preciso, tecnico e propositivo.
          claude_args: |
            --max-turns 15
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,GlobTool,GrepTool"
            --append-system-prompt "Sei integrato in DorkEye, uno strumento OSINT/security Python. Sii rigoroso sulle vulnerabilità ma costruttivo nel tono. Priorità assoluta alla sicurezza e alla stabilità."

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Assistente interattivo
  # Risponde ai @claude nei commenti di PR e issues
  # ─────────────────────────────────────────────────────────────────────────────
  interactive:
    name: 💬 Claude Interactive Assistant
    if: |
      github.event_name == 'issue_comment' ||
      github.event_name == 'pull_request_review_comment' ||
      github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 10
            --append-system-prompt "Sei Claude, assistente AI integrato nel repository GitHub di DorkEye — strumento Python avanzato di OSINT e Google Dorking creato da xPloits3c (handle: xPloits3c). Conosci l'architettura completa: dorkeye.py (main), Tools/dorkeye_analyze.py (SQLi analyzer con confidence scoring), Tools/dorkeye_report.py (report HTML), config/ (YAML template). Stack: Python 3.8+, rich, requests, urllib3, ddgs>=4.0.0<5.0.0 (pinnato a v4 — v5 rompe l'API), PyYAML. Plugin opzionale: llama-cpp-python (LLM locale), playwright (screenshot). Aiuta con bug report, feature request, domande sul codice e analisi di sicurezza. Sii tecnico, preciso e conciso."

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Audit settimanale automatico
  # Ogni lunedì: security scan, bug hunt, dep review, repo health
  # Crea una issue GitHub con il report completo
  # ─────────────────────────────────────────────────────────────────────────────
  weekly-audit:
    name: 🔐 Weekly Security Audit & Repo Maintenance
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # History completo per analisi approfondita

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DorkEye dependencies + audit tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety 2>/dev/null || true

      - name: Run Bandit static security scan
        run: |
          bandit -r . -f json -o bandit-report.json \
            --exclude ./.git,./venv,./.venv,./node_modules \
            -ll 2>/dev/null || true
          echo "✅ Bandit scan completato"

      - name: Run Safety dependency vulnerability check
        run: |
          safety check --json > safety-report.json 2>/dev/null || true
          echo "✅ Safety check completato"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            DATA AUDIT: ${{ github.run_started_at }}

            Stai eseguendo l'audit settimanale automatico di DorkEye —
            strumento Python avanzato di OSINT e Google Dorking creato da xPloits3c.

            ARCHITETTURA:
            - dorkeye.py: script principale
            - Tools/dorkeye_analyze.py: SQLi analyzer (controlla CRITICAL gap e baseline_status)
            - Tools/dorkeye_report.py: report HTML (XSS-sensitive, usa escaping)
            - config/: YAML template e configurazioni dork
            - requirements.txt: requests, urllib3, PyYAML, rich, ddgs>=4.0.0,<5.0.0
            - .github/: workflows, SECURITY.md, CONTRIBUTING.md, issue templates

            ESEGUI QUESTI TASK IN ORDINE:

            ━━━ 1. SECURITY AUDIT ━━━
            - Leggi tutti i file .py e identifica vulnerabilità di sicurezza
            - Leggi bandit-report.json (se esiste) per i risultati automatici
            - Leggi safety-report.json (se esiste) per dipendenze vulnerabili
            - Cerca: XSS in HTML output, injection flaws, yaml.load() insicuro,
              secrets hardcoded, funzioni security-critical mai invocate
            - Verifica che ddgs sia ancora pinnato a >=4.0.0,<5.0.0
              ⚠️ NON suggerire upgrade a v5 — breaking changes sull'API intenzionali

            ━━━ 2. BUG HUNT ━━━
            - Identifica logic error, None dereference, exception non gestite
            - Controlla gap SQLiConfidence.CRITICAL nell'analyzer
            - Verifica gestione baseline_status == None
            - Cerca payload time-based SQLi cross-database incompleti
            - Funzioni definite ma mai invocate (es. test_path_based_sqli)

            ━━━ 3. DEPENDENCY REVIEW ━━━
            - Verifica requirements.txt per pacchetti outdated o vulnerabili
            - Controlla dipendenze dirette importate ma solo transitive nel file
            - Segnala version range che potrebbero essere allargate o stringate

            ━━━ 4. REPOSITORY HEALTH ━━━
            - README.md aggiornato con le feature correnti?
            - SECURITY.md ha info di disclosure corrette?
            - Cerca TODO/FIXME/HACK nel codice
            - Workflow .github/ usano versioni deprecate delle actions?
            - Issue template e PR template sono aggiornati?

            ━━━ 5. MIGLIORAMENTI ━━━
            - Suggerimenti architetturali ad alto impatto
            - Feature mancanti rispetto alle issue aperte
            - Gap di documentazione

            DOPO L'ANALISI:
            Crea una GitHub issue con titolo:
            "🦅 DorkEye Weekly Audit — $(date +"%Y-W%V")"

            Struttura il report con:
            - Tabella riepilogativa con conteggi per severity
            - Sezioni separate per ogni area di analisi
            - Severity: 🔴 CRITICAL / 🟡 HIGH / 🔵 MEDIUM / 🟢 LOW / ℹ️ INFO
            - Ogni finding con: descrizione, file:linea, raccomandazione
            - Sezione "Quick Wins" con i fix più facili e impattanti
            - Aggiungi label "maintenance" se esiste nel repo
          claude_args: |
            --max-turns 25
            --allowedTools "Read,GlobTool,GrepTool,Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(date:*),Bash(gh issue create:*),Bash(gh issue list:*),Bash(gh label list:*)"
            --append-system-prompt "Sii rigoroso e metodico. Prioritizza finding reali di sicurezza rispetto a suggerimenti di stile. Il report della issue deve essere in Markdown pulito, leggibile e azionabile. Non creare issue duplicate — controlla prima se esiste già un audit della settimana corrente."
