variables:
  domain:
    - ru
    - gov.ru

  sqli_db:
    - '"ORA-"'
    - '"ODBC"'
    - '"SQLite"'
    - '"password"'
    - '"SQLSTATE"'
    - '"Warning:"'
    - '"SQL syntax"'
    - '"PostgreSQL"'
    - '"mysql_fetch"'
    - '"DB_PASSWORD"'
    - '"Warning: mysqli"'
    - '"index of" ".git"'
    - '"PostgreSQL ERROR"'
    - '"SQLite3::SQLException"'
    - '"Unclosed quotation mark"'
    - '"api_key"'
    - '"BEGIN RSA PRIVATE KEY"'
    - '"AWS_SECRET_ACCESS_KEY"'
    - '"You have an error in your SQL syntax"'
    - '"Microsoft OLE DB Provider for SQL Server"'

  param:
    - .php?
    - ?cat
    - index.php
    - login.php?
    - admin.php?
    - ?id

templates:

  sqli:
    mode: aggressive
    dorks:
      - 'site:{domain} inurl:{param}'
      - 'site:{domain} inurl:{param} intext:{sqli_db}'
