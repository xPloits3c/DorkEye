# Configuration for Geopolitical Intelligence & OSINT Monitoring
# Target: Government, Military, and Diplomatic domains
variables:
  target_domains:
    - gov.il
    - gov.ir
    - gov.tr
    - gov
    - mil
    - europa.eu
    - eeas.europa.eu
    - nato.int

  intel_keywords:
    - "classified"
    - "confidential"
    - "memo"
    - "iran-israel"
    - "war"
    - "agreement"
    - "deployment"
    - "sanctions"
    - "treaty"
    - "bilateral"
    - "minutes of meeting"

  doc_extensions:
    - pdf
    - docx
    - xlsx
    - pptx
    - kml

templates:
  # Monitoring official documents and potential data leaks
  geopolitical_intel:
    description: "General monitoring of sensitive government documents"
    dorks:
      soft:
        - 'site:{target_domains} filetype:{doc_extensions} "{intel_keywords}"'
        - 'site:{target_domains} "internal use only" filetype:pdf'
      medium:
        - 'site:{target_domains} intitle:"index of" "proceedings"'
        - 'site:{target_domains} intext:"not for public release" filetype:pdf'
        - 'site:{target_domains} "strictly confidential" "{intel_keywords}"'
      aggressive:
        - 'site:{target_domains} "classified" OR "top secret" filetype:pdf'
        - 'site:{target_domains} inurl:backup OR inurl:archive "intelligence"'
        - 'site:{target_domains} "distribution statement" "proprietary"'

  # Specific focus on agreements, treaties and diplomatic timelines
  diplomatic_agreements:
    description: "Tracking diplomatic relations and treaty drafts"
    dorks:
      soft:
        - 'site:{target_domains} "memorandum of understanding" AFTER:2025-01-01'
        - 'site:{target_domains} "bilateral agreement" filetype:pdf'
      medium:
        - 'site:{target_domains} "draft agreement" (Iran OR Israel OR USA)'
        - 'site:{target_domains} "timeline" "escalation" filetype:pdf'
        - 'site:{target_domains} "joint statement" "sanctions" AFTER:2025-06-01'
      aggressive:
        - 'site:{target_domains} "final draft" "treaty" "confidential"'
        - 'site:{target_domains} inurl:docs "secret agreement"'
        - 'site:{target_domains} "minutes of meeting" "security council"'

  # Infrastructure, logistics and procurement analysis
  logistics_tracking:
    description: "Monitoring logistics, movements and military procurement"
    dorks:
      soft:
        - 'site:{target_domains} "procurement" "defense" filetype:xlsx'
        - 'site:{target_domains} "vessel movement" OR "flight plan"'
      medium:
        - 'site:{target_domains} inurl:ftp "shipping list"'
        - 'site:{target_domains} "supply chain" "military" filetype:pdf'
        - 'site:{target_domains} "deployment schedule" filetype:docx'
      aggressive:
        - 'site:{target_domains} inurl:upload "logistics" ext:xlsx'
        - 'site:{target_domains} "cargo manifest" "port of" (Israel OR Iran)'
        - 'site:{target_domains} "maintenance log" "hardware" "military"'

  # Identifying leaked configurations and sensitive directories
  leaked_configs:
    description: "Discovery of exposed technical files and login portals"
    dorks:
      soft:
        - 'site:{target_domains} inurl:secure "login"'
        - 'site:{target_domains} intitle:"index of" "config"'
      medium:
        - 'site:{target_domains} "password" OR "credential" filetype:log'
        - 'site:{target_domains} inurl:vpn "config" ext:ovpn'
        - 'site:{target_domains} "confidential" ext:pdf "not for redistribution"'
      aggressive:
        - 'site:{target_domains} "sql dump" OR "database" ext:sql'
        - 'site:{target_domains} inurl:admin "dashboard"'
        - 'site:{target_domains} inurl:git "config" OR ".env"'
