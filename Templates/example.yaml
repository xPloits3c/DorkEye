variables:
  domain:
    - ru
    - example.com

  param:
    - cv
    - secret
    - data

  extension:
    - pdf
    - xls
    - xlsx
    - doc

templates:

  example_search:
    mode: soft
    dorks:
      - 'site:{domain} inurl:{param}'
      - 'filetype:{extension} site:{domain}'

  documents:
    mode: soft
    dorks:
      - 'site:{domain} filetype:{extension}'
      - 'filetype:pdf site:{domain}'
      
  directories:
    mode: soft
    dorks:
      - '"index of" site:{domain}'
      - '"parent directory" site:{domain}'
    
  sqli:
    mode: aggressive
    dorks:
      - 'site:{domain} inurl:.php?{param}='
      
  sensitive:
    mode: medium
    dorks:
      - '"BEGIN RSA PRIVATE KEY"'
