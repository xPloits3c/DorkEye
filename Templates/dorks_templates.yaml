# ============================================================
#  DorkEye | Default Dork Templates
#  Author: xPloits3c | https://github.com/xPloits3c/DorkEye
#
#  Every category defines all three modes:
#    soft       → safe, minimal queries, low noise
#    medium     → balanced, standard assessment
#    aggressive → maximum coverage, pair with --stealth
#
#  Note: cctv and sensitive use flat mode (mode: aggressive)
#        all other categories use nested soft/medium/aggressive
#
#  Usage:
#    --dg=sqli --mode=soft
#    --dg=cctv --mode=aggressive --stealth
#    --dg=all  --mode=aggressive --stealth
# ============================================================

