templates:

  # ──────────────────────────────────────────────
  #  SQL INJECTION
  # ──────────────────────────────────────────────
  sqli:
    description: "SQL injection point discovery via GET parameters"
    dorks:
      soft:
        - 'site:{domain} inurl:{param}'
        - 'site:{domain} inurl:{param} filetype:{extension}'
        - 'site:{domain} inurl:{param} intext:"error"'
        - 'site:{domain} inurl:{param} intext:"warning"'
      medium:
        - 'site:{domain} inurl:{param} intext:"{sqli_db}"'
        - 'site:{domain} inurl:{param} "{sqli_db}"'
        - 'site:{domain} inurl:{param} filetype:{extension} intext:"error"'
        - 'site:{domain} inurl:{param} intext:"{sense}"'
        - 'site:{domain} filetype:{extension} intext:"{sqli_db}"'
        - 'site:{domain} inurl:{param} intext:"{sqli_db}"'
      aggressive:
        - 'site:{domain} inurl:{param} intext:"{sqli_db}" filetype:{extension}'
        - 'site:{domain} inurl:{param} intext:"{sense}" filetype:{extension}'
        - 'site:{domain} inurl:{param} "{sqli_db}" "{sense}"'
        - 'site:{domain} inurl:{param} intext:"{sqli_db}" intext:"{sense}"'
        - 'site:{domain} filetype:{extension} "{sqli_db}"'
        - 'site:{domain} inurl:{param} "{sqli_db}"'
        - 'site:{domain} inurl:{param} ext:{extension}'
        - 'site:{domain} inurl:{param} filetype:{extension} "{sense}"'
        - 'site:{domain} intext:"{sqli_db}" inurl:{param}'

  # ──────────────────────────────────────────────
  #  ADMIN PANELS
  # ──────────────────────────────────────────────
  admin:
    description: "Admin panels and login interfaces"
    dorks:
      soft:
        - 'site:{domain} inurl:{param}'
        - 'site:{domain} intitle:{param}'
        - 'site:{domain} inurl:login'
        - 'site:{domain} intitle:"login"'
      medium:
        - 'site:{domain} inurl:{param} intitle:{sense}'
        - 'site:{domain} intitle:{sense}'
        - 'site:{domain} inurl:{param} intext:{sense}'
        - 'site:{domain} inurl:{param} filetype:{extension}'
        - 'site:{domain} intitle:{param} intext:{sense}'
        - 'site:{domain} inurl:{param} "{sense}"'
      aggressive:
        - 'site:{domain} inurl:{param} intitle:{sense} intext:{sense}'
        - 'site:{domain} inurl:{param} filetype:{extension} intext:{sense}'
        - 'site:{domain} inurl:{param} "{sense}" "{param}"'
        - 'site:{domain} filetype:{extension} intitle:{sense}'
        - 'site:{domain} intext:{sense} inurl:{param}'
        - 'site:{domain} intitle:{sense} filetype:{extension}'
        - 'site:{domain} inurl:{param} ext:{extension}'
        - 'site:{domain} inurl:{param} intext:"password"'
        - 'site:{domain} intext:"password" inurl:{param}'

  # ──────────────────────────────────────────────
  #  BACKUP FILES
  # ──────────────────────────────────────────────
  backups:
    description: "Exposed backup and archive files"
    dorks:
      soft:
        - 'site:{domain} ext:{extension}'
        - 'site:{domain} filetype:{extension}'
        - 'site:{domain} inurl:{param} ext:{extension}'
        - 'site:{domain} inurl:backup'
      medium:
        - 'site:{domain} filetype:{extension} inurl:{param}'
        - 'site:{domain} filetype:{extension} intext:{sense}'
        - 'site:{domain} ext:{extension} inurl:{param}'
        - 'site:{domain} inurl:{param} "{sense}"'
        - 'site:{domain} filetype:{extension} "{sqli_db}"'
        - 'site:{domain} ext:{extension} intext:"backup"'
      aggressive:
        - 'site:{domain} filetype:{extension} "{sqli_db}" "{sense}"'
        - 'site:{domain} inurl:{param} filetype:{extension} "{sense}"'
        - 'site:{domain} ext:{extension} intext:{sqli_db}'
        - 'site:{domain} ext:{extension} intext:{sense}'
        - 'site:{domain} inurl:{param} ext:{extension} "{sqli_db}"'
        - 'site:{domain} filetype:{extension} intext:"password"'
        - 'site:{domain} filetype:{extension} intext:"username"'
        - 'site:{domain} inurl:{param} "{sqli_db}"'
        - 'site:{domain} filetype:{extension} intext:"confidential"'
        - 'filetype:{extension} site:{domain}'
        - 'site:{domain} inurl:{param} intext:"{sqli_db}" filetype:{extension}'

  # ──────────────────────────────────────────────
  #  DATABASES
  # ──────────────────────────────────────────────
  databases:
    description: "Publicly indexed database files"
    dorks:
      soft:
        - 'site:{domain} filetype:{extension}'
        - 'site:{domain} ext:{extension}'
        - 'site:{domain} inurl:{param} filetype:{extension}'
        - 'site:{domain} inurl:database ext:{extension}'
      medium:
        - 'site:{domain} filetype:{extension} intext:"CREATE TABLE"'
        - 'site:{domain} filetype:{extension} intext:"INSERT INTO"'
        - 'site:{domain} filetype:{extension} intext:{sense}'
        - 'site:{domain} ext:{extension} inurl:{param}'
        - 'site:{domain} filetype:{extension} intext:{sqli_db}'
        - 'site:{domain} filetype:{extension} intitle:"index of"'
      aggressive:
        - 'site:{domain} filetype:{extension} "CREATE TABLE" "{sense}"'
        - 'site:{domain} filetype:{extension} "INSERT INTO" "{sense}"'
        - 'site:{domain} ext:{extension} intext:{sense} intext:{sqli_db}'
        - 'site:{domain} inurl:{param} filetype:{extension} "{sqli_db}"'
        - 'site:{domain} filetype:{extension} intext:"username" intext:"password"'
        - 'site:{domain} filetype:{extension} intext:"email" intext:"password"'
        - 'site:{domain} filetype:{extension} "{sqli_db}" "{sense}"'
        - 'site:{domain} ext:{extension} inurl:dump'
        - 'site:{domain} filetype:{extension} intext:"admin"'

  # ──────────────────────────────────────────────
  #  CONFIGURATION FILES
  # ──────────────────────────────────────────────
  configs:
    description: "Exposed configuration files"
    dorks:
      soft:
        - 'site:{domain} ext:{extension}'
        - 'site:{domain} filetype:{extension}'
        - 'site:{domain} inurl:{param} ext:{extension}'
        - 'site:{domain} inurl:config'
      medium:
        - 'site:{domain} ext:{extension} intext:{sense}'
        - 'site:{domain} filetype:{extension} intext:{sense}'
        - 'site:{domain} ext:{extension} intext:{sqli_db}'
        - 'site:{domain} filetype:{extension} intext:"password"'
        - 'site:{domain} inurl:{param} filetype:{extension}'
        - 'site:{domain} filetype:{extension} "{sqli_db}"'
      aggressive:
        - 'site:{domain} filetype:{extension} "{sqli_db}" "{sense}"'
        - 'site:{domain} inurl:{param} filetype:{extension} intext:{sense}'
        - 'site:{domain} ext:{extension} intext:{sqli_db} intext:{sense}'
        - 'site:{domain} filetype:{extension} intext:"connection"'
        - 'site:{domain} inurl:{param} ext:{extension} "{sense}"'
        - 'site:{domain} filetype:{extension} intext:"api_key"'
        - 'site:{domain} filetype:{extension} intext:"secret"'
        - 'site:{domain} inurl:{param} filetype:{extension} "{sqli_db}"'
        - 'site:{domain} ext:{extension} intext:"credential"'

  # ──────────────────────────────────────────────
  #  CREDENTIALS
  # ──────────────────────────────────────────────
  credentials:
    description: "Exposed credential and secret files"
    dorks:
      soft:
        - 'site:{domain} ext:{extension}'
        - 'site:{domain} filetype:{extension}'
        - 'site:{domain} inurl:{param} ext:{extension}'
        - 'site:{domain} intext:{sense}'
      medium:
        - 'site:{domain} ext:{extension} intext:{sense}'
        - 'site:{domain} filetype:{extension} intext:"password"'
        - 'site:{domain} filetype:{extension} intext:"username"'
        - 'site:{domain} inurl:{param} filetype:{extension}'
        - 'site:{domain} ext:{extension} intext:{sqli_db}'
        - 'site:{domain} inurl:{param} intext:{sense}'
      aggressive:
        - 'site:{domain} filetype:{extension} intext:"password" intext:"username"'
        - 'site:{domain} ext:{extension} "{sense}" "{sqli_db}"'
        - 'site:{domain} filetype:{extension} intext:{sense} intext:{sqli_db}'
        - 'site:{domain} inurl:{param} filetype:{extension} "{sense}"'
        - 'site:{domain} ext:{extension} intext:"credential"'
        - 'site:{domain} filetype:{extension} intext:"token"'
        - 'site:{domain} ext:{extension} intext:"secret"'
        - 'site:{domain} inurl:{param} ext:{extension} intext:"password"'
        - 'site:{domain} filetype:{extension} "{sense}" "{param}"'
        - 'site:{domain} inurl:".env" intext:"{sqli_db}"'

  # ──────────────────────────────────────────────
  #  DOCUMENTS
  # ──────────────────────────────────────────────
  documents:
    description: "Sensitive documents indexed publicly"
    dorks:
      soft:
        - 'site:{domain} filetype:{extension}'
        - 'site:{domain} ext:{extension}'
        - 'site:{domain} filetype:{extension} intext:{sense}'
        - 'site:{domain} filetype:{extension} "{sense}"'
      medium:
        - 'site:{domain} filetype:{extension} intext:{sense} inurl:{param}'
        - 'site:{domain} filetype:{extension} "{sense}" "{param}"'
        - 'site:{domain} filetype:{extension} intext:"password"'
        - 'site:{domain} filetype:{extension} intext:"confidential"'
        - 'site:{domain} filetype:{extension} intext:{sqli_db}'
        - 'site:{domain} inurl:{param} filetype:{extension}'
      aggressive:
        - 'site:{domain} filetype:{extension} "{sense}" "{param}"'
        - 'site:{domain} filetype:{extension} "{sense}" "{sqli_db}"'
        - 'site:{domain} filetype:{extension} intext:{sense} intext:{sqli_db}'
        - 'site:{domain} inurl:{param} filetype:{extension} "{sense}"'
        - 'site:{domain} filetype:{extension} intext:"username" intext:"password"'
        - 'site:{domain} filetype:{extension} intext:"credit"'
        - 'site:{domain} filetype:{extension} intext:"finance"'
        - 'site:{domain} filetype:{extension} intext:"internal"'
        - 'site:{domain} inurl:{param} filetype:{extension} "{sqli_db}"'

  # ──────────────────────────────────────────────
  #  SCRIPTS
  # ──────────────────────────────────────────────
  scripts:
    description: "Exposed server-side scripts and code"
    dorks:
      soft:
        - 'site:{domain} ext:{extension}'
        - 'site:{domain} filetype:{extension}'
        - 'site:{domain} inurl:{param} ext:{extension}'
        - 'site:{domain} inurl:{param} filetype:{extension}'
      medium:
        - 'site:{domain} ext:{extension} intext:{sense}'
        - 'site:{domain} filetype:{extension} intext:{sense}'
        - 'site:{domain} ext:{extension} intext:{param}'
        - 'site:{domain} inurl:{param} ext:{extension} intext:{sense}'
        - 'site:{domain} filetype:{extension} intext:"password"'
        - 'site:{domain} ext:{extension} intext:"upload"'
      aggressive:
        - 'site:{domain} ext:{extension} intext:{sqli_db}'
        - 'site:{domain} filetype:{extension} "{sqli_db}" "{sense}"'
        - 'site:{domain} inurl:{param} ext:{extension} "{sense}"'
        - 'site:{domain} ext:{extension} intext:"{sense}" intext:"{param}"'
        - 'site:{domain} filetype:{extension} intext:"cmd"'
        - 'site:{domain} ext:{extension} intext:"exec"'
        - 'site:{domain} ext:{extension} intext:"system"'
        - 'site:{domain} inurl:{param} filetype:{extension} "{sqli_db}"'
        - 'site:{domain} ext:{extension} intext:"debug"'
        - 'site:{domain} ext:{extension}'

  # ──────────────────────────────────────────────
  #  LOG FILES
  # ──────────────────────────────────────────────
  logs:
    description: "Exposed server and application log files"
    dorks:
      soft:
        - 'site:{domain} ext:{extension}'
        - 'site:{domain} inurl:log'
        - 'site:{domain} intitle:"log"'
        - 'site:{domain} filetype:{extension}'
      medium:
        - 'site:{domain} ext:{extension} intext:{sense}'
        - 'site:{domain} ext:{extension} intext:{sqli_db}'
        - 'site:{domain} filetype:{extension} intext:"error"'
        - 'site:{domain} inurl:{param} ext:{extension}'
        - 'site:{domain} filetype:{extension} intext:"exception"'
        - 'site:{domain} filetype:{extension} "{sqli_db}"'
      aggressive:
        - 'site:{domain} ext:{extension} "{sqli_db}" "{sense}"'
        - 'site:{domain} inurl:{param} ext:{extension} intext:{sense}'
        - 'site:{domain} filetype:{extension} intext:"stack trace"'
        - 'site:{domain} ext:{extension} intext:"fatal"'
        - 'site:{domain} filetype:{extension} intext:"login failed"'
        - 'site:{domain} intext:{sqli_db} ext:{extension}'
        - 'site:{domain} filetype:{extension} "{sense}"'
        - 'site:{domain} inurl:{param} filetype:{extension} "{sqli_db}"'
        - 'site:{domain} ext:{extension} intext:"warning"'
        - 'site:{domain} ext:log intext:"php_error"'
        - 'site:{domain} ext:log intext:"{sqli_db}"'

  # ──────────────────────────────────────────────
  #  OPEN DIRECTORIES
  # ──────────────────────────────────────────────
  open_dirs:
    description: "Open directory listings"
    dorks:
      soft:
        - 'site:*.{tld} intitle:"index of"'
        - 'site:{domain} intitle:"index of"'
        - 'site:{domain} intitle:"index of /"'
        - 'site:{domain} intitle:"directory listing"'
        - 'site:{domain} intitle:"index of" inurl:{param}'
      medium:
        - 'site:{domain} intitle:"index of" intext:{extension}'
        - 'site:{domain} intitle:"index of" intext:{sense}'
        - 'site:*.{tld} intitle:"index of" intext:{sense}'
        - 'site:{domain} intitle:"index of" filetype:{extension}'
        - 'site:{domain} intitle:"index of" inurl:{param}'
        - 'site:*.{tld} intitle:"index of" filetype:{extension}'
        - 'site:{domain} intitle:"index of" "{sense}"'
        - 'site:{domain} intitle:"index of" "{extension}"'
      aggressive:
        - 'site:*.{tld} intitle:"index of"'
        - 'site:{domain} intitle:"index of" intext:{extension} intext:{sense}'
        - 'site:{domain} intitle:"index of" filetype:{extension} intext:{sense}'
        - 'site:{domain} intitle:"index of" "{sense}" "{extension}"'
        - 'site:*.{tld} intitle:"index of" filetype:{extension}'
        - 'site:{domain} intitle:"index of" inurl:{param} intext:{sense}'
        - 'site:{domain} intitle:"index of" inurl:{param} filetype:{extension}'
        - 'site:{domain} intitle:"index of" intext:{sqli_db}'
        - 'site:*.{tld} intitle:"index of" intext:{sense}'
        - 'site:{domain} intitle:"index of" filetype:{extension} "{sqli_db}"'
        - 'site:{domain} intitle:"index of" intext:"password"'
        - 'site:{domain} intitle:"index of" intext:"backup"'

  # ──────────────────────────────────────────────
  #  ERROR PAGES
  # ──────────────────────────────────────────────
  errors:
    description: "Verbose error pages exposing stack traces and tech info"
    dorks:
      soft:
        - 'site:{domain} intext:{sqli_db}'
        - 'site:{domain} intext:"error"'
        - 'site:*.{tld} intext:"fatal error"'
        - 'site:{domain} intext:"exception"'
        - 'site:{domain} intext:"warning"'
      medium:
        - 'site:{domain} intext:{sqli_db} inurl:{param}'
        - 'site:{domain} intext:{sqli_db} filetype:{extension}'
        - 'site:*.{tld} intext:{sqli_db}'
        - 'site:{domain} intext:"stack trace"'
        - 'site:{domain} intext:"fatal error"'
        - 'site:*.{tld} intext:"stack trace"'
        - 'site:{domain} intext:"exception" inurl:{param}'
        - 'site:{domain} intext:"error" filetype:{extension}'
      aggressive:
        - 'site:{domain} intext:{sqli_db} inurl:{param} filetype:{extension}'
        - 'site:{domain} intext:{sqli_db} intext:{sense}'
        - 'site:*.{tld} intext:"stack trace"'
        - 'site:{domain} intext:"stack trace" inurl:{param}'
        - 'site:{domain} intext:"uncaught exception"'
        - 'site:*.{tld} intext:"fatal error"'
        - 'site:{domain} intext:"debug" intext:{sqli_db}'
        - 'site:{domain} intext:"application error" filetype:{extension}'
        - 'site:*.{tld} intext:{sqli_db}'
        - 'site:{domain} intext:{sqli_db} "{sense}"'
        - 'site:{domain} inurl:{param} intext:"fatal"'
        - 'site:{domain} intext:{sqli_db} intext:"line"'

  # ──────────────────────────────────────────────
  #  IOT DEVICES
  # ──────────────────────────────────────────────
  iot:
    description: "Exposed IoT device management interfaces"
    dorks:
      soft:
        - 'site:{domain} intitle:{sense}'
        - 'site:{domain} inurl:{param}'
        - 'site:{domain} intitle:"login"'
        - 'site:{domain} inurl:login'
      medium:
        - 'site:{domain} inurl:{param} intitle:{sense}'
